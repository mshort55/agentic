version: "1.0"

# Agent Registry
# Agent identity (name, description, triggers) lives in each agent's .md file
# This file defines infrastructure config: how agents run (model, tools)

agent_registry:
  # Domain expert agents - specialized knowledge consultants for specific domains
  domain_experts:
    - name: go-expert
      type: domain_expert
      enabled: true
      model: opus
      tools:
        - Read
        - Grep
        - Glob
        - WebSearch
        - WebFetch

    - name: k8s-expert
      type: domain_expert
      enabled: true
      model: opus
      tools:
        - Read
        - Grep
        - Glob
        - WebSearch
        - WebFetch

    - name: controller-expert
      type: domain_expert
      enabled: true
      model: opus
      tools:
        - Read
        - Grep
        - Glob
        - WebSearch
        - WebFetch

    - name: crd-expert
      type: domain_expert
      enabled: true
      model: opus
      tools:
        - Read
        - Grep
        - Glob
        - WebSearch
        - WebFetch

    - name: unit-test-expert
      type: domain_expert
      enabled: true
      model: opus
      tools:
        - Read
        - Grep
        - Glob
        - WebSearch
        - WebFetch

    - name: e2e-test-expert
      type: domain_expert
      enabled: true
      model: opus
      tools:
        - Read
        - Grep
        - Glob
        - WebSearch
        - WebFetch

    - name: coding-expert
      type: domain_expert
      enabled: true
      model: opus
      tools:
        - Read
        - Grep
        - Glob
        - WebSearch
        - WebFetch

  # Orchestrator agents - coordinate and synthesize
  orchestrator_agents:
    - name: design-spec-orchestrator
      type: orchestrator
      description: "Main orchestrator for design spec analysis"
      enabled: true
      model: opus

# Paths for agent management
paths:
  agent_template: ".claude/agents/templates/domain-expert-template.md"
  agent_directories:
    - ".claude/agents/domain-experts"

# Orchestrator defaults
orchestrator:
  default_mode: "full"  # Options: full, smart, focused
